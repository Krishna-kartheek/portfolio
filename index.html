<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRISHNA KARTHEEK TALAM | AI Engineer Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M12 2L2 22h20L12 2zm0 3.99L19.53 19H4.47L12 5.99z'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0B0F19;
            --surface: rgba(17, 24, 39, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f1f3f9;
            --muted: #6e758a;
            --accent: #3b82f6;
            --glow: rgba(59, 130, 246, 0.25);
        }
        [data-theme="light"] {
            --bg: #f4f6f9;
            --surface: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.08);
            --text: #0f172a;
            --muted: #64748b;
            --accent: #2563eb;
            --glow: rgba(37, 99, 235, 0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0B0F19;
            background: linear-gradient(135deg, #0B0F19, #111827, #0F172A);
            background-attachment: fixed;
            color: var(--text);
            padding: 2rem;
            max-width: 950px;
            margin: 0 auto;
            transition: background 0.3s, color 0.3s;
            overflow-x: hidden;
        }
        [data-theme="light"] body {
            background: linear-gradient(135deg, #f4f6f9, #e2e8f0, #cbd5e1);
        }

        #spotlight {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            background: radial-gradient(600px circle at var(--x, 0px) var(--y, 0px), var(--glow), transparent 80%);
        }

        /* Scroll Animation Target */
        section { 
            padding: 5rem 0 3rem 0; 
            border-bottom: 1px dashed var(--border); 
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem; font-weight: 900; margin-bottom: 2rem; color: var(--text);
            text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 0.5rem;
        }
        
        #hero { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            min-height: 60vh;
            opacity: 1 !important;
            transform: none !important;
        }

        /* Recruiter Trick: Terminal Typing Animation */
        .typing-container {
            display: inline-block;
            border-right: 3px solid var(--accent);
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 2s steps(22, end) forwards, blink 0.75s step-end infinite;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.1rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em;
            color: var(--text); text-shadow: 0 0 20px var(--glow);
        }
        @media(max-width: 600px) { 
            h1 { font-size: 1.8rem; } 
            .typing-container { white-space: normal; width: auto; border: none; animation: none; }
        }
        
        .tagline { font-size: 1.1rem; line-height: 1.6; color: var(--muted); font-weight: 500; margin-bottom: 2rem; }
        .tagline span { color: var(--text); font-weight: 700; }

        /* Actions Bar Button Hover Rigging */
        .action-bar { display: flex; flex-wrap: wrap; gap: 1rem; }
        .btn {
            font-family: 'JetBrains Mono', monospace;
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.5rem; border-radius: 6px; font-size: 0.85rem; font-weight: 700;
            text-decoration: none; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn-primary {
            background: var(--accent); color: #fff; border: 1px solid transparent;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-4px);
            background: #2563eb;
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }
        
        /* Attention-grabber Call to Action for Resume Link */
        .btn-secondary {
            background: var(--surface); color: var(--text); border: 1px solid var(--border);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            animation: pulse-border 2.5s infinite;
        }
        .btn-secondary:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 15px var(--glow);
            animation: none;
        }
        [data-theme="light"] .btn-secondary:hover { background: rgba(0, 0, 0, 0.02); }

        .about-content p { font-size: 0.95rem; line-height: 1.8; margin-bottom: 1.5rem; color: var(--text); }
        
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; }
        .skill-card { 
            background: var(--surface); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border); padding: 1.5rem; border-radius: 8px; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .skill-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent);
            box-shadow: 0 10px 25px var(--glow);
        }
        .skill-category { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 0.75rem; }
        .skill-names { font-size: 1rem; color: var(--text); font-weight: 500; }

        .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 2rem; }
        @media(max-width: 500px) { .projects-grid { grid-template-columns: 1fr; } }
        .project-card { 
            background: var(--surface); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .project-card:hover { 
            transform: translateY(-6px); 
            border-color: var(--accent);
            box-shadow: 0 12px 30px var(--glow);
        }
        .project-info { padding: 1.75rem; flex-grow: 1; display: flex; flex-direction: column; }
        .project-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
        .project-title { font-size: 1.25rem; font-weight: 700; color: var(--text); }
        .project-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.5rem; flex-grow: 1; }
        
        .project-features { margin-bottom: 1.5rem; }
        .project-features-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--text); margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .project-features-list { list-style: none; font-size: 0.85rem; color: var(--text); display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
        .project-features-list li { display: flex; align-items: center; gap: 0.4rem; }
        .project-features-list li::before { content: "•"; color: var(--accent); font-weight: bold; }

        .project-links { display: flex; gap: 0.75rem; margin-top: auto; }
        .project-btn { padding: 0.5rem 1rem; font-size: 0.75rem; border-radius: 4px; text-decoration: none; font-weight: 700; transition: all 0.2s ease; }
        .project-btn-primary { background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid rgba(59, 130, 246, 0.2); }
        .project-btn-primary:hover { background: var(--accent); color: white; }
        .project-btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
        .project-btn-secondary:hover { color: var(--text); border-color: var(--muted); }

        .projects-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.25rem; }
        .project-tag { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); color: var(--muted); font-size: 0.7 ceramic; padding: 0.25rem 0.6rem; border-radius: 4px; }

        .validation-card {
            background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border); padding: 1.75rem; border-radius: 8px; display: flex; flex-direction: column; gap: 1rem;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .validation-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--accent);
            box-shadow: 0 10px 25px var(--glow);
        }
        .card-content h3 { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 0.25rem; }
        .card-content p { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.25rem; }
        .cert-code { font-size: 0.75rem; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
        .verify-btn { align-self: flex-start; }

        .cert-image-container {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        .cert-image-container img {
            width: 100%;
            max-width: 650px;
            height: auto;
            border-radius: 6px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
        }
        .cert-image-container img:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .contact-link {
            display: flex; align-items: center; gap: 1rem; 
            background: var(--surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border); padding: 1.2rem; border-radius: 8px; text-decoration: none; color: var(--text); font-size: 0.85rem; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            min-width: 0; overflow: hidden; word-break: break-all;
        }
        .contact-link:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 8px 20px var(--glow); }
        .contact-icon { width: 24px; height: 24px; fill: var(--accent); flex-shrink: 0; }
        .contact-link span { overflow: hidden; text-overflow: ellipsis; white-space: normal; }

        .dock-container { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 10000; width: max-content; max-width: 95vw; }
        .dock {
            display: flex; align-items: center; gap: 0.25rem;
            background: rgba(10, 11, 16, 0.35);
            backdrop-filter: blur(24px) saturate(210%); -webkit-backdrop-filter: blur(24px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.06); padding: 0.4rem; border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 24px 64px rgba(0, 0, 0, 0.7);
            overflow-x: auto;
        }
        [data-theme="light"] .dock {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05), inset 0 1px 1px rgba(255, 255, 255, 0.6), 0 24px 64px rgba(0, 0, 0, 0.1);
        }
        .dock button, .dock a {
            font-family: 'JetBrains Mono', monospace; background: transparent; border: none;
            color: var(--muted); font-size: 0.8rem; font-weight: 500; padding: 0.6rem 1rem; border-radius: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); text-decoration: none; display: inline-block; white-space: nowrap;
        }
        .dock button:hover, .dock a:hover { color: var(--text); background: rgba(255, 255, 255, 0.05); }
        [data-theme="light"] .dock button:hover, [data-theme="light"] .dock a:hover { background: rgba(0, 0, 0, 0.03); }
        .dock .active-btn { color: var(--text) !important; background: rgba(255, 255, 255, 0.12); box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 2px 8px rgba(0, 0, 0, 0.2); }
        [data-theme="light"] .dock .active-btn { background: rgba(0, 0, 0, 0.08); box-shadow: none; }
        .theme-toggle { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; padding: 0 !important; border-radius: 50% !important; flex-shrink: 0; }
        .theme-icon { width: 18px; height: 18px; fill: var(--muted); transition: fill 0.2s; }
        .theme-toggle:hover .theme-icon { fill: var(--text); }

        /* Animation Keyframe Pools */
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: var(--accent); }
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        @media print {
            body { background: white !important; color: black !important; padding: 0; max-width: 100%; }
            section { padding: 2rem 0; opacity: 1 !important; transform: none !important; border-bottom: 1px solid #ccc; }
            .dock-container, #spotlight, .action-bar, .project-links, .theme-toggle, .project-btn { display: none !important; }
            .skill-card, .project-card, .validation-card, .contact-link { backdrop-filter: none !important; background: transparent !important; border: 1px solid #aaa !important; transform: none !important; }
            .section-title { color: black !important; }
            h1 { text-shadow: none !important; color: black !important; }
        }
    </style>
</head>
